# geonpil 빌드 → Docker Hub 푸시 → AWS 서버 배포
# master 브랜치 push 시 실행
# 빌드/푸시: GitHub 호스트 runner. 배포: self-hosted runner(배포 대상 서버에 설치)에서 자동 실행.
# 필수 Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (배포는 같은 서버에서 로컬 명령만 실행하므로 SSH 관련 Secret 불필요)

name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOCKER_IMAGE_GEONPIL: geonpil

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push geonpil
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_GEONPIL }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_GEONPIL }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted]
    needs: build-and-push
    steps:
      - name: Deploy (same server)
        run: |
          cd /opt/geonpil
          sudo docker compose -f docker-compose.prod.yml pull
          sudo docker compose -f docker-compose.prod.yml up -d
          sudo docker compose -f docker-compose.prod.yml ps
