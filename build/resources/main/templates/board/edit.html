<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">

<!-- Toast UI Editor CSS -->

<!-- Toast UI Editor Script -->
  <th:block layout:fragment="meta">
    <title>건필 - 글 수정</title>
  </th:block>
  <th:block layout:fragment="css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  </th:block>

<body>
<div layout:fragment="content">
  <div class="write-wrapper">
    <div class="write-card">
    <h2 class="form-title">✍ 글쓰기</h2>

      <form id = "postForm"  th:action="@{/board/edit/{id}(id=${post.postId})}" method="post">

      <!-- 분류 선택 -->
        <div class="form-group">
          <select id="categoryId" name="categoryId" required class="form-select">
            <option value="">-- 분류 선택 --</option>
            <th:block th:each="cat : ${categories}">
              <option th:value="${cat.id}"
                      th:text="${cat.categoryName}"
                      th:selected="${cat.id == post.categoryId}">
              </option>
            </th:block>
          </select>
        </div>

        <!-- 제목 -->
        <div class="form-group">
          <input type="text" name="title" th:value="${post.title}" required />
        </div>

        <!-- 내용 -->
        <div class="form-group">
          <div id="editor" class="form-editor"></div>
        </div>

        <!-- 버튼 -->
        <div class="form-buttons">
          <button type="submit" class="basic-btn">수정 완료</button>
          <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
        </div>

        <input type="hidden" name="boardCode" th:value="${boardCode}" />
        <input type="hidden" name="content" id="content-hidden" />
        <input type="hidden" id="original-content" th:value="${post.content}" />
      </form>
  </div>
</div>
</div>

<th:block layout:fragment="script">
  <!-- 공통 toast editor 초기화 -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/toast-editor.js"></script>
</th:block>
</body>
</html>
