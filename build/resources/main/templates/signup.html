<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    #submitBtn:disabled {
      background-color: #ddd !important;
      color: #888 !important;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
<div layout:fragment="content">

  <div class="form-card">
    <h2 class="form-title">회원가입</h2>

    <form th:action="@{/signup}" th:object="${user}" method="post">

      <!-- 이메일 입력 -->
      <div class="form-group">
        <div class="form-flex email-row">
          <input type="text" id="email-id" placeholder="이메일 아이디" oninput="checkEmailFull()">
          <span class="email-at">@</span>
          <div class="email-domain-wrapper">
            <select id="email-domain-select" onchange="handleDomainChange()">
              <option value="naver.com">naver.com</option>
              <option value="gmail.com">gmail.com</option>
              <option value="daum.net">daum.net</option>
              <option value="custom">직접입력</option>
            </select>
            <input type="text" id="email-domain-input" placeholder="직접 입력" style="display: none;" oninput="checkEmailFull()">
          </div>

          <input type="hidden" id="email" name="email">
        <div id ="email-check"></div>
      </div>


      <!-- 인증코드 전송 버튼 + 재전송 링크 -->
      <div class="form-group" id="codeSend-section">
        <button type="button" id="sendCodeBtn" class="basic-btn" onclick="sendVerificationCode()">인증코드 전송</button>
        <a href="#" id="resend-link" onclick="resendVerificationCode()" style="display:none;">이메일을 받지 못하셨나요? 재전송</a>
      </div>


      <!-- 인증코드 입력 -->
      <div class="form-group" id="verification-section" style="display:none;">
        <div class="form-flex">
          <input type="text" id="email-verification-code" placeholder="인증코드 입력">
          <button type="button" class="basic-btn" onclick="verifyCode()">확인</button>
        </div>
        <div id ="verification-check"></div>
      </div>



      <!-- 비밀번호 -->
      <div class="form-group">
        <input type="password" id="password" name="password" placeholder="비밀번호" required oninput="checkPasswordMatch()">
        <small class="form-hint">영문, 숫자를 포함한 8자 이상의 비밀번호를 입력해주세요.</small>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="form-group">
        <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 확인" required oninput="checkPasswordMatch()">
        <div id="password-check" class="validation-text"></div>
      </div>

      <!-- 닉네임 -->
      <div class="form-group">
        <input type="text" id="nickname" name="nickname" placeholder="닉네임" required onblur="checkNickname()">
        <div id="nickname-check" class="validation-text"></div>
        <small class="form-hint">닉네임은 중복이 불가능합니다. 2~20자까지 입력해주세요.</small>
      </div>

      <!-- 제출 + 취소 버튼 -->
      <div class="form-flex">
        <button id="submitBtn" class = "basic-btn" type="submit" disabled style="flex: 1;">
          가입하기
        </button>
        <button class="cancel-btn" type="button" onclick="history.back()">
          취소
        </button>
      </div>

    </form>
    </div>
  </div>
<th:block layout:fragment="script">
<script>
  let validNickname = false;
  let validEmail = false;
  let validPassword = false;
  let verifiedEmail = false;
  let sentCode = "";
  let timer;
  let timeLeft = 300;

  function updateSubmitButton() {
    const btn = document.getElementById("submitBtn");
    btn.disabled = !(validNickname && validPassword && verifiedEmail);
  }

  function getFullEmail() {
    const id = document.getElementById("email-id").value;
    const select = document.getElementById("email-domain-select");
    const domain = select.value === "custom"
      ? document.getElementById("email-domain-input").value
      : select.value;
    return `${id}@${domain}`;
  }

  function handleDomainChange() {
    const select = document.getElementById("email-domain-select");
    const customInput = document.getElementById("email-domain-input");

    if (select.value === "custom") {
      customInput.style.display = "inline-block";
    } else {
      customInput.style.display = "none";
      customInput.value = "";
    }
    checkEmailFull();
  }

  function checkEmailFull() {
    const email = getFullEmail();
    document.getElementById("email").value = email;
    const msg = document.getElementById("email-check");
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!regex.test(email)) {
      msg.innerText = "유효하지 않은 이메일 형식입니다.";
      msg.style.color = "red";
      validEmail = false;
      updateSubmitButton();
      return;
    }

    fetch(`/verify/email?email=${email}`)
      .then(res => res.text())
      .then(result => {
        if (result === "available") {
          msg.innerText = "사용 가능한 이메일입니다.";
          msg.style.color = "green";
          validEmail = true;
        } else {
          msg.innerText = "이미 사용 중인 이메일입니다.";
          msg.style.color = "red";
          validEmail = false;
        }
        updateSubmitButton();
      });
  }

  function checkPasswordMatch() {
    const pwd = document.getElementById("password").value;
    const pwdConfirm = document.getElementById("passwordConfirm").value;
    const msg = document.getElementById("password-check");

    if (pwd && pwdConfirm) {
      const validFormat = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
      if (!validFormat.test(pwd)) {
        msg.innerText = "비밀번호는 영문과 숫자를 포함한 8자 이상이어야 합니다.";
        msg.style.color = "red";
        validPassword = false;
      } else if (pwd === pwdConfirm) {
        msg.innerText = "비밀번호가 일치합니다.";
        msg.style.color = "green";
        validPassword = true;
      } else {
        msg.innerText = "비밀번호가 일치하지 않습니다.";
        msg.style.color = "red";
        validPassword = false;
      }
    } else {
      msg.innerText = "";
      validPassword = false;
    }
    updateSubmitButton();
  }

  function checkNickname() {
    const nickname = document.getElementById("nickname").value;
    const msg = document.getElementById("nickname-check");

    if (nickname.length < 2 || nickname.length > 20) {
      msg.innerText = "닉네임은 2자 이상 20자 이하로 입력해주세요.";
      msg.style.color = "red";
      validNickname = false;
      updateSubmitButton();
      return;
    }

    fetch(`/verify/nickname?nickname=${nickname}`)
      .then(res => res.text())
      .then(result => {
        if (result === "available") {
          msg.innerText = "사용 가능한 닉네임입니다.";
          msg.style.color = "green";
          validNickname = true;
        } else {
          msg.innerText = "이미 사용 중인 닉네임입니다.";
          msg.style.color = "red";
          validNickname = false;
        }
        updateSubmitButton();
      });
  }
function sendVerificationCode() {
  const email = getFullEmail();
  if (!email) {
    alert("이메일을 입력해주세요.");
    return;
  }

  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!regex.test(email)) {
    alert("유효하지 않은 이메일 형식입니다.");
    return;
  }

  // 서버에 중복 체크 요청
  fetch(`/verify/email?email=${email}`)
    .then(res => res.text())
    .then(result => {
      if (result === "duplicate") {
        alert("이미 사용 중인 이메일입니다.");
      } else {
        // 통과한 경우에만 인증코드 전송
        fetch(`/verify/send-code`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `email=${encodeURIComponent(email)}`
        })
        .then(res => res.text())
        .then(code => {
        document.getElementById("email").value = email;
          sentCode = code;
          alert("인증코드가 이메일로 전송되었습니다.");

          document.getElementById("verification-section").style.display = "block";
          document.getElementById("sendCodeBtn").disabled = true;
          document.getElementById("resend-link").style.display = "inline";
          startTimer();
        });
      }
    });
}

function resendVerificationCode() {
  sendVerificationCode();
}

function verifyCode() {
  const inputCode = document.getElementById("email-verification-code").value;
  const verificationSection = document.getElementById("verification-section");
  const verificationCheck = document.getElementById("verification-check");

  fetch("/verify/code", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `code=${encodeURIComponent(inputCode)}`
  })
  .then(res => res.text())
  .then(result => {
    if (result === "success") {
      verificationSection.style.display = "none";
      verificationCheck.innerText = "✅ 인증 완료되었습니다.";
      verificationCheck.style.color = "green";
      verificationCheck.style.display = "block";

      verifiedEmail = true;
      clearInterval(timer);
      document.getElementById("codeSend-section").style.display = "none";
    } else {
      verificationCheck.innerText = "❌ 인증코드가 일치하지 않습니다.";
      verificationCheck.style.color = "red";
      verificationCheck.style.display = "block";
      verifiedEmail = false;
    }
    updateSubmitButton();
  });
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 300;
  timer = setInterval(() => {
    if (timeLeft <= 0) {
      clearInterval(timer);
      sentCode = "";
      document.getElementById("verification-check").innerText = "❗ 인증코드가 만료되었습니다. 다시 요청해주세요.";
      document.getElementById("verification-check").style.color = "red";
      verifiedEmail = false;
      updateSubmitButton();
    } else {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById("verification-check").innerText = `남은 시간: ${minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
      document.getElementById("verification-check").style.color = "gray";
    }
    timeLeft--;
  }, 1000);
}
</script>
</th:block>
</body>
</html>
