# 개발 환경 설정 (로컬)
# DB, ES, 메일, OAuth 등은 환경변수로 주입 (docker-compose.yml / .env / Run Configuration)

server:
  address: 0.0.0.0
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/geonpil?serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  devtools:
    restart:
      enabled: true
    trigger-file: .trigger
    livereload:
      enabled: true
  web:
    resources:
      cache:
        period: 0
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    enable-spring-el-compiler: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${OAUTH_NAVER_CLIENT_ID:}
            client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID:}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

elasticsearch:
  host: ${ELASTICSEARCH_HOST:https://localhost:9201}
  username: ${ELASTICSEARCH_USERNAME:}
  password: ${ELASTICSEARCH_PASSWORD:}
  ssl:
    # 개발용: .env 미로드 시에도 self-signed 인증서 허용 (기본 true)
    insecure: ${ELASTICSEARCH_SSL_INSECURE:true}

search:
  service:
    use-remote: true
    base-url: ${SEARCH_SERVICE_BASE_URL:http://localhost:8081}

kakao:
  api:
    key: ${KAKAO_API_KEY:}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.geonpil
  map-underscore-to-camel-case: true
