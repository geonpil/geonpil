<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout.html">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
<div layout:fragment="content">
    <div class="form-card">
        <h2 style="text-align: center;">비밀번호 재설정</h2>
        <br>
        <form th:action="@{/verify/find/reset-password}" method="post">

            <!-- 새 비밀번호 입력 -->
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="새 비밀번호" required oninput="checkPasswordMatch()">
                <small style="color: gray;">영문, 숫자를 포함한 8자 이상의 비밀번호를 입력해주세요.</small>
            </div>

            <!-- 새 비밀번호 확인 -->
            <div class="form-group">
                <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="새 비밀번호 확인" required oninput="checkPasswordMatch()">
                <div id="password-check" style="font-size: 0.85rem; margin-top: 5px;"></div>
            </div>

            <button id="resetPasswordBtn" class="basic-btn" type="submit" disabled>
                비밀번호 변경하기
            </button>
        </form>
    </div>
</div>

<th:block layout:fragment="script">
    <script>

  let validPassword = false;

  function checkPasswordMatch() {
    const pwd = document.getElementById("password").value;
    const pwdConfirm = document.getElementById("passwordConfirm").value;
    const msg = document.getElementById("password-check");

    if (pwd && pwdConfirm) {
      const validFormat = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
      if (!validFormat.test(pwd)) {
        msg.innerText = "비밀번호는 영문과 숫자를 포함한 8자 이상이어야 합니다.";
        msg.style.color = "red";
        validPassword = false;
      } else if (pwd === pwdConfirm) {
        msg.innerText = "비밀번호가 일치합니다.";
        msg.style.color = "green";
        validPassword = true;
      } else {
        msg.innerText = "비밀번호가 일치하지 않습니다.";
        msg.style.color = "red";
        validPassword = false;
      }
    } else {
      msg.innerText = "";
      validPassword = false;
    }

    // 버튼 활성화
    const btn = document.getElementById("resetPasswordBtn");
    btn.disabled = !validPassword;
  }



    </script>
</th:block>

</body>
</html>
