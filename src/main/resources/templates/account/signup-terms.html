<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>회원가입 약관 동의</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/pages/loginAndSignup/common.css" />
  <link rel="stylesheet" href="/css/pages/account/signup-terms.css" />
</head>

<body>
<div layout:fragment="content">
  <div class="card p-20">
    <!-- 이용약관 내용 fragment 포함 -->
    <th:block th:include="account/_terms-content :: terms-content"></th:block>
    


    <!-- 개인정보 처리방침 내용 fragment 포함 -->
    <th:block th:include="account/_terms-content :: privacy-content"></th:block>

    <form action="/signup/form" method="get">
      <label>
        <input type="checkbox" id="agreeChk" name="agreed" value="true" required>
        <span>[필수] 위 약관에 모두 동의합니다.</span>
      </label>

      <div class="form-flex" style="margin-top:20px;">
        <button type="submit" id="agreeBtn" class="basic-btn" style="flex:1;">계속</button>
        <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
      </div>
    </form>
  </div>
</div>

<th:block layout:fragment="script">
  <script>
    const agreeChk = document.getElementById('agreeChk');

    // 폼 제출 시 약관 동의 여부 확인
    document.querySelector('form').addEventListener('submit', function(e) {
      if (!agreeChk.checked) {
        alert('약관에 동의해 주세요.');
        e.preventDefault();
      }
    });
  </script>
</th:block>
</body>
</html>
