<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>회원탈퇴 신청</title>
    <link rel="stylesheet" href="/css/withdraw.css">
</head>

<div layout:fragment="content">
    <section class="withdraw-container">
        <div class = "card-wrapper">
            <h2>회원탈퇴 신청</h2>

            <p class="description">회원 탈퇴 신청에 앞서 아래 내용을 반드시 확인해주세요.</p>

            <div class="withdraw-guide card-wrapper">
                <h4>회원탈퇴 시 처리내용</h4>
                <ul>
                    <li>작성하신 게시물(글, 댓글)은 자동 삭제되지 않습니다.</li>
                    <li>탈퇴 후 본인 확인이 어려워 게시물 수정 및 삭제 요청이 불가합니다. 원하신다면 탈퇴 전 삭제해 주세요.</li>
                    <li>개인정보는 관련 법령에 따라 보관 또는 파기됩니다.</li>
                </ul>
            </div>

            <form th:action="@{/withdraw}" method="post">
                <div class="withdraw-check">
                    <label>
                        <input type="checkbox" name="agree" required>
                        위 내용을 모두 확인하였습니다.
                    </label>
                </div>

                <div class="withdraw-reason">
                    <h4>회원탈퇴 사유를 선택해주세요. <span class="required">(필수)</span></h4>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="reasons" value="이용빈도 낮음"> 이용빈도 낮음</label>
                        <label><input type="checkbox" name="reasons" value="재가입"> 재가입</label>
                        <label><input type="checkbox" name="reasons" value="콘텐츠 부족"> 콘텐츠 부족</label>
                        <label><input type="checkbox" name="reasons" value="개인정보 보호"> 개인정보 보호</label>
                        <label><input type="checkbox" name="reasons" value="기타"> 기타</label>
                    </div>
                </div>

                <div class="withdraw-feedback">
                    <h4>더 나은 서비스를 위해 불편했던 점을 알려주세요. (선택)</h4>
                    <textarea name="feedback" placeholder="서비스 개선에 도움이 되는 의견을 적어주세요." maxlength="2000"></textarea>
                    <div class="char-count">0 / 2000</div>
                </div>

                <div class="withdraw-actions">
                    <button type="submit" class="delete-btn">탈퇴 신청</button>
                    <a href="/" class="basic-btn">취소하기</a>
                </div>
            </form>
        </div>
    </section>

</div>

<th:block layout:fragment="script">
    <script>
        // 글자수 실시간 표시
        document.addEventListener("DOMContentLoaded", function () {
            const textarea = document.querySelector("textarea[name='feedback']");
            const countEl = document.querySelector(".char-count");
            if (textarea && countEl) {
                textarea.addEventListener("input", function () {
                    countEl.textContent = `${this.value.length} / 2000`;
                });
            }

            // 탈퇴 사유 체크 여부 검사
            const form = document.querySelector("form");
            form.addEventListener("submit", function (e) {
                const checked = document.querySelectorAll("input[name='reasons']:checked");
                if (checked.length === 0) {
                    alert("탈퇴 사유를 한 가지 이상 선택해주세요.");
                    e.preventDefault();
                }
            });
        });
    </script>
</th:block>
</html>
