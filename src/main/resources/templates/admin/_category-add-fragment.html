<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="categoryAddFormFragment">
    <div class="category-add-form">
        <h2>카테고리 추가</h2>
        <p class="description">새로운 카테고리를 추가합니다.</p>
        
        <form id="categoryAddForm" class="form-container">
            <div class="form-group">
                <label for="boardCode">게시판 선택</label>
                <select id="boardCode" name="boardCode" required>
                    <option value="">게시판을 선택하세요</option>
                    <th:each items="${boardTypes}" var="boardType">
                        <option value="${boardType.boardCode}">${boardType.boardName}</option>
                    </th:each>
                </select>
            </div>
            
            <div class="form-group">
                <label for="categoryName">카테고리 이름</label>
                <input type="text" 
                       id="categoryName" 
                       name="categoryName" 
                       placeholder="카테고리 이름을 입력하세요" 
                       maxlength="50" 
                       required>
                <small class="form-help">최대 50자까지 입력 가능합니다.</small>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">카테고리 추가</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">초기화</button>
            </div>
        </form>
        
        <div id="categoryAddMessage" class="message" style="display: none;"></div>
        
        <!-- 최근 추가된 카테고리 목록 -->
        <div id="recentCategoriesSection" style="display: none; margin-top: 20px;">
            <h3>최근 추가된 카테고리</h3>
            <div id="recentCategoriesList" class="recent-categories-list"></div>
        </div>
    </div>
    
    <script>
        function resetForm() {
            document.getElementById('categoryAddForm').reset();
            document.getElementById('categoryAddMessage').style.display = 'none';
        }
        
        window.showMessage = function(message, type = 'info') {
            const messageDiv = document.getElementById('categoryAddMessage');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 성공 메시지일 때는 5초, 에러는 3초 후 숨기기
            const hideTime = type === 'success' ? 5000 : 3000;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, hideTime);
        }
        
        window.showRecentCategories = function(boardCode) {
            if (!boardCode) return;
            
            csrfFetch(`/admin/categories?boardCode=${boardCode}`)
                .then(response => response.json())
                .then(categories => {
                    const recentSection = document.getElementById('recentCategoriesSection');
                    const recentList = document.getElementById('recentCategoriesList');
                    
                    if (categories.length > 0) {
                        recentList.innerHTML = categories.map(category => `
                            <span class="category-tag">${category.categoryName}</span>
                        `).join('');
                        recentSection.style.display = 'block';
                    } else {
                        recentSection.style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('카테고리 목록 로드 실패:', error);
                });
        }
        
        // 페이지 로드 시 즉시 이벤트 리스너 등록
        const addBoardSelect = document.getElementById('boardCode');
        if (addBoardSelect) {
            addBoardSelect.addEventListener('change', function() {
                console.log('추가 게시판 선택됨:', this.value);
                if (this.value) {
                    window.showRecentCategories(parseInt(this.value));
                } else {
                    document.getElementById('recentCategoriesSection').style.display = 'none';
                }
            });
        }
    </script>
</th:block>

</html>
