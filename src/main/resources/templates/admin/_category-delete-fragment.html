<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="categoryDeleteFormFragment">
    <div class="category-delete-form">
        <h2>카테고리 삭제</h2>
        <p class="description">기존 카테고리를 삭제합니다.</p>
        
        <div class="form-container">
            <div class="form-group">
                <label for="deleteBoardCode">게시판 선택</label>
                <select id="deleteBoardCode" name="boardCode">
                    <option value="">게시판을 선택하세요</option>
                    <th:block th:each="boardType : ${boardTypes}">
                        <option th:value="${boardType.boardCode}" th:text="${boardType.boardName}"></option>
                    </th:block>
                </select>
            </div>
            
            <div id="categoryListContainer" class="category-list-container" style="display: none;">
                <h3>현재 카테고리 목록</h3>
                <div id="categoryList" class="category-list">
                    <!-- 카테고리 목록이 동적으로 로드됩니다 -->
                </div>
                
                <div id="noCategoriesMessage" class="no-data-message" style="display: none;">
                    해당 게시판에 등록된 카테고리가 없습니다.
                </div>
            </div>
        </div>
        
        <div id="categoryDeleteMessage" class="message" style="display: none;"></div>
    </div>
    
    <script>
        // 모든 카테고리 관련 함수들은 admin.js에서 전역으로 정의됨
        // 이벤트 리스너도 admin.js의 initCategoryDelete()에서 등록됨
    </script>
</th:block>

</html>
