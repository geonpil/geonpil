<th:block th:fragment="noticeAddFormFragment">
    <div class="admin-form-wrapper">
        <h2 class="form-title">📢 전체 공지 작성</h2>
        
        <form id="noticeForm" method="post" enctype="multipart/form-data">
            <!-- 제목 -->
            <div class="form-group">
                <label for="noticeTitle">제목 <span class="required">*</span></label>
                <input type="text" id="noticeTitle" name="title" class="form-input" placeholder="공지 제목을 입력하세요" required />
            </div>

            <!-- 내용 -->
            <div class="form-group">
                <label for="noticeEditor">내용 <span class="required">*</span></label>
                <div id="noticeEditor" class="form-editor"></div>
            </div>

            <!-- 파일 첨부 -->
            <div class="form-group">
                <label for="noticeFiles">파일 첨부</label>
                <input type="file" id="noticeFiles" name="files" multiple class="form-input"/>
                <small class="form-text">여러 파일을 선택할 수 있습니다.</small>
            </div>

            <!-- 버튼 -->
            <div class="form-buttons">
                <button type="submit" class="basic-btn">등록</button>
                <button type="button" class="cancel-btn" id="noticeResetBtn">초기화</button>
            </div>

            <!-- Hidden fields -->
            <input type="hidden" name="boardCode" value="99" />
            <input type="hidden" name="categoryId" value="99" />
            <input type="hidden" name="content" id="noticeContentHidden" />
        </form>

        <!-- 메시지 표시 영역 -->
        <div id="noticeAddMessage" class="message" style="display: none; margin-top: 20px;"></div>
    </div>
</th:block>
