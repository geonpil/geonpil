<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">

<!-- Toast UI Editor CSS -->

<!-- Toast UI Editor Script -->
  <th:block layout:fragment="meta">
    <title>건필 - 글 수정</title>
  </th:block>


  <th:block layout:fragment="css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" href="/css/pages/board/board.css">
  </th:block>
<body>
<div layout:fragment="content">
  <div class="write-wrapper card p-20">
    <div class="write-card">
    <h2 class="form-title">✍ 글쓰기</h2>

      <form id = "postForm"  th:action="@{/board/edit/{id}(id=${post.postId})}" method="post" enctype="multipart/form-data">

      <!-- 분류 선택 -->
        <div class="form-group">
          <select id="categoryId" name="categoryId" required class="form-select">
            <option value="">-- 분류 선택 --</option>
            <th:block th:each="cat : ${categories}">
              <option th:value="${cat.id}"
                      th:text="${cat.categoryName}"
                      th:selected="${cat.id == post.categoryId}">
              </option>
            </th:block>
          </select>
        </div>

        <!-- 제목 -->
        <div class="form-group">
          <input type="text" name="title" th:value="${post.title}" required />
        </div>

        <!-- 내용 -->
        <div class="form-group">
          <div id="editor" class="form-editor"></div>
        </div>

        <!-- 파일 첨부 수정 -->
        <div class="form-group">
          <label>기존 첨부파일</label>
          <div th:if="${attachments != null and !#lists.isEmpty(attachments)}">
            <ul class="attachment-list">
              <li th:each="att : ${attachments}" class="attachment-item">
                <span th:text="${att.originalName}"></span>
                <label class="delete-label">
                  <input type="checkbox" name="deleteAttachmentIds" th:value="${att.attachmentId}" />
                  삭제
                </label>
              </li>
            </ul>
          </div>
          <div th:if="${attachments == null or #lists.isEmpty(attachments)}">
            <p style="color:#888">첨부된 파일이 없습니다.</p>
          </div>
        </div>

        <div class="form-group">
          <label for="files">새 파일 추가</label>
          <input type="file" id="files" name="files" multiple class="form-input" />
        </div>

        <!-- 버튼 -->
        <div class="form-buttons">
          <button type="submit" class="basic-btn">수정 완료</button>
          <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
        </div>

        <input type="hidden" name="boardCode" th:value="${boardCode}" />
        <input type="hidden" name="content" id="content-hidden" />
        <input type="hidden" id="original-content" th:value="${post.content}" />
      </form>
  </div>
</div>
</div>

<th:block layout:fragment="script">
  <!-- 공통 toast editor 초기화 -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/toast-editor.js"></script>
</th:block>
</body>
</html>
