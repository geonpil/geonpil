<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      th:inline="text">

<th:block layout:fragment="meta">
    <title>건필 - 공모전</title>
</th:block>

<th:block layout:fragment="css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</th:block>

<body>
<div layout:fragment="content">
    <div class="board-header" th:text="${boardName}">게시판 이름</div>
    <div class="board-container">
        <div class="board-wrapper">
            <div class="category-filter">
                <!-- 전체 버튼 -->
                <button class="category-btn"
                        data-id=""
                        onclick="selectAllCategories(this)">
                    전체
                </button>

                <!-- 카테고리 버튼 -->
                <button type="button"
                        th:each="cat : ${categories}"
                        th:data-id="${cat.id}"
                        th:text="${cat.categoryName}"
                        class="category-btn"
                        onclick="toggleCategory(this)">
                </button>
            </div>

            <div id="post-list" class="board-list"
                 th:replace="~{board/_post-list-fragment :: postListFragment(${posts}, ${page}, ${totalPages}, ${boardCode})}">
            </div>


            <div class="write-btn">
                <a th:href="@{/board/write(boardCode=${boardCode})}" class="basic-btn">✍ 글쓰기</a>
            </div>


        </div>


        <div class="board-banner">배너자리</div>

    </div>
</div>
<th:block layout:fragment="script">
    <script>

        document.addEventListener("DOMContentLoaded", function () {

            // ✅ '전체' 버튼에 .active 클래스 부여
            const allBtn = document.querySelector('.category-btn[data-id=""]');
            if (allBtn) allBtn.classList.add("active");

        });

        const selectedCategories = new Set();

        function toggleCategory(btn) {
            const id = btn.dataset.id;

            document.querySelector('.category-btn[data-id=""]').classList.remove("active");

            if (selectedCategories.has(id)) {
                selectedCategories.delete(id);
                btn.classList.remove("active");
            } else {
                selectedCategories.add(id);
                btn.classList.add("active");
            }

            fetchFilteredPosts();
        }

        function fetchFilteredPosts(page = 1) {
            const params = new URLSearchParams();

            highlightSelectedButtons()

            if (selectedCategories.size > 0) {
                params.set("categoryIds", Array.from(selectedCategories).join(","));
            }

            const boardCode = new URLSearchParams(window.location.search).get("boardCode");
            if (boardCode) {
                params.set("boardCode", boardCode);
            }

            params.set("page", page);

            fetch("/board/list/fragment?" + params.toString())
                .then(res => res.text())
                .then(html => {
                    document.getElementById("post-list").innerHTML = html;
                })
                .catch(err => console.error("게시글 불러오기 실패", err));
        }


        function selectAllCategories(btn) {
            // 모든 카테고리 버튼 비활성화
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));

            // 전체 버튼만 활성화
            btn.classList.add("active");

            // 선택된 카테고리 Set 비우기
            selectedCategories.clear();

            // 전체 게시글 요청
            fetchFilteredPosts();
        }


        function highlightSelectedButtons() {
            const allBtn = document.querySelector('.category-btn[data-id=""]');

            document.querySelectorAll(".category-btn").forEach(btn => {
                const id = btn.dataset.id;

                if (id === "") {
                    // 전체 버튼은 선택된 카테고리가 아무것도 없을 때만 활성화
                    if (selectedCategories.size === 0) {
                        btn.classList.add("active");
                    } else {
                        btn.classList.remove("active");
                    }
                } else {
                    // 일반 카테고리 버튼
                    if (selectedCategories.has(id)) {
                        btn.classList.add("active");
                    } else {
                        btn.classList.remove("active");
                    }
                }
            });
        }
    </script>
</th:block>
</body>
</html>
