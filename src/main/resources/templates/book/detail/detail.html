<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">
<head>
    <meta charset="UTF-8">
    <title>책 상세보기</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/search.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div layout:fragment="content">
    <div id="toast" class="toast-message hidden">리뷰가 등록되었어요!</div>


    <div class="book-detail-container">
        <!-- 왼쪽: 책 정보 -->
        <aside class="book-info card-wrapper">
            <img th:src="${book.thumbnail}" alt="책 표지" class="book-cover"/>
            <div class="book-meta">
                <h2 th:text="${book.title}">책 제목</h2>
                <p><strong>저자:</strong> <span th:text="${book.authors}">저자</span></p>
                <p><strong>출판사:</strong> <span th:text="${book.publisher}">출판사</span></p>
                <p><strong>ISBN:</strong> <span th:text="${book.isbn}">ISBN</span></p>
                <p><strong>책소개:</strong></p>
                <p th:text="${book.contents}">줄거리 내용</p>
            </div>
        </aside>
        <!-- 오른쪽: 리뷰 -->
        <section class="book-reviews card-wrapper">
            <h1>🌟 평균 평점: <span th:text="${avgRating}">4.3</span></h1>

            <!-- 리뷰 작성 -->
            <th:block sec:authorize="isAuthenticated()">
                <form class="review-form" id="reviewForm" onsubmit="return false;">
                    <div class="rating-group">
                        <div class="rating-stars" id="ratingStars">
                            <div class="stars-fill" id="fillStars"></div>
                        </div>
                        <input type="hidden" name="rating" id="ratingInput" value="0"/>
                        <div class="rating-text">
                            <span id="ratingDisplay"></span>
                        </div>
                    </div>

                    <div class="comment-group">
                        <textarea class="comment-input" id="reviewContent" name="reviewContent"
                                  placeholder="리뷰를 남겨주세요"></textarea>
                        <button id="submitReviewBtn" type="button">리뷰 작성</button>
                    </div>
                </form>
            </th:block>

            <th:block sec:authorize="isAnonymous()">
                <div class="border-bottom border-top" style="padding : 15px; margin-top : 15px;">
                    리뷰를 작성하려면 <a href="/login" class="link">로그인</a> 해주세요.
                </div>
            </th:block>


            <div id="reviewList">
                <div th:if="${#lists.isEmpty(reviews)}" class="comment-empty">
                    등록된 리뷰가 없습니다.
                </div>

                <article th:each="review : ${reviews}" class="review-card">
                    <p><strong th:text="${review.username}">닉네임</strong> 님의 평가</p>
                    <p>⭐ <span th:text="${review.rating}">5</span>점</p>
                    <p th:text="${review.content}">좋은 책입니다.</p>
                    <button class="like-btn review-like-btn"
                            th:classappend="${review.likedByCurrentUser} ? 'review-liked' : ''"
                            th:attr="data-review-id=${review.reviewId}">
                        <i th:class="'like-icon review-like-icon fa-thumbs-up ' + (${review.likedByCurrentUser} ? 'fa-solid' : 'fa-regular')"></i>
                        <span class="like-count" th:text="${review.likeCount} ?: 0">0</span>
                    </button>

                    <!--삭제 버튼-->
                    <th:block th:if="${currentUserId == review.userId}">
                        <button class="delete-btn review-delete-btn"  th:attr="data-review-id=${review.reviewId}">
                            <i class="fa-solid fa-trash delete-icon"></i>
                        </button>
                    </th:block>

                </article>
            </div>
        </section>
    </div>


    <th:block layout:fragment="script">
        <script src="/js/toastMessage.js"></script>
        <script>
            const currentUserId = [[${currentUserId} ?: 'null']];

            document.addEventListener("DOMContentLoaded", () => {
                //리뷰 별 애니메이션
                const starContainer = document.getElementById('ratingStars');
                const fillStars = document.getElementById('fillStars');
                const ratingInput = document.getElementById('ratingInput');
                const totalStars = 5;

                if (starContainer) {
                    starContainer.addEventListener('mousemove', (e) => {
                        const rect = starContainer.getBoundingClientRect();
                        const offsetX = e.clientX - rect.left;
                        const starWidth = rect.width / totalStars;
                        let rating = Math.ceil((offsetX / starWidth) * 2) / 2; // 0.5 단위

                        const fillPercent = (rating / totalStars) * 100;
                        fillStars.style.width = `${fillPercent}%`;
                    });

                    starContainer.addEventListener('mouseleave', () => {
                        // 마우스를 벗어나면 기존 값 유지
                        const current = parseFloat(ratingInput.value) || 0;
                        fillStars.style.width = `${(current / totalStars) * 100}%`;
                    });

                    starContainer.addEventListener('click', (e) => {
                        const rect = starContainer.getBoundingClientRect();
                        const offsetX = e.clientX - rect.left;
                        const starWidth = rect.width / totalStars;
                        const rating = Math.ceil((offsetX / starWidth) * 2) / 2;
                        ratingInput.value = rating;

                        fillStars.style.width = `${(rating / totalStars) * 100}%`;
                        document.getElementById("ratingDisplay").innerText = rating.toFixed(1);
                    });
                }


                //리뷰 등록
                if (document.getElementById("submitReviewBtn")) {
                    document.getElementById("submitReviewBtn").addEventListener("click", async () => {
                        const rating = parseFloat(document.getElementById("ratingInput").value);
                        const content = document.getElementById("reviewContent").value;
                        const bookId = [[${book.bookId}]];

                        if (!rating || !content.trim()) {
                            alert("별점과 리뷰를 모두 입력해주세요.")
                            return;
                        }

                        const data = {
                            bookId: bookId,
                            rating: rating,
                            content: content
                        };


                        try {
                            const response = await fetch('/api/reviews', {
                                method: 'POST',
                                headers: {
                                    'content-type': 'application/json',
                                },
                                body: JSON.stringify(data)
                            });

                            if (response.status === 401) {
                                alert("로그인이 필요합니다.");
                                window.location.href = "/login";
                                return;
                            }

                            if (response.ok) {
                                const newReview = await response.json();

                                appendReview(newReview)
                                showToast("리뷰가 등록되었어요!");

                                const avgRes = await fetch(`/api/reviews/average?bookId=${bookId}`);
                                const avgRating = await avgRes.text();

                                document.querySelector(".book-reviews h1 span").innerHTML = avgRating;

                                const commentEmpty = document.querySelector(".comment-empty")

                                if(commentEmpty) {commentEmpty.remove();}

                                //초기화
                                document.getElementById("reviewContent").value = "";
                                ratingInput.value = "0";
                                fillStars.style.width = "0%";
                                document.getElementById("ratingDisplay").innerText = "0";
                            } else {
                                const error = await response.text();
                                alert("리뷰 등록 실패 :" + error);
                            }

                        } catch (e) {
                            alert("에러 발생:" + e.message);
                        }


                    });
                }

                //좋아요
                document.addEventListener("click", async (e) => {
                    const likeBtn = e.target.closest(".like-btn");
                    if (!likeBtn) return;

                    const reviewId = likeBtn.dataset.reviewId;

                    try {
                        const res = await fetch(`/api/reviews/${reviewId}/like`, {method: "POST"});

                        if (res.ok) {
                            const count = await res.text();
                            const countEl = likeBtn.querySelector(".like-count");
                            if (countEl) {
                                countEl.innerText = count;
                            }
                            const icon = likeBtn.querySelector(".like-icon");
                            if (icon) {
                                icon.classList.toggle("fa-regular");
                                icon.classList.toggle("fa-solid");
                            }

                            const isLiked = likeBtn.classList.toggle("review-liked");

                            // ✅ 좋아요/취소 구분해서 메시지 표시
                            showToast(
                                isLiked ? "좋아요를 눌렀어요!" : "좋아요를 취소했어요!",
                                !isLiked // true면 취소 상태
                            );

                        } else if (res.status === 401) {
                            const goLogin = confirm("로그인이 필요해요.\n로그인 하시겠어요?");
                            if (goLogin) {
                                window.location.href = "/login";
                            }
                        } else {
                            alert("오류가 발생했습니다.");
                        }
                    } catch (err) {
                        console.error("추천 처리 중 오류 발생:", err);
                        alert("네트워크 오류가 발생했습니다.");
                    }
                });

                document.addEventListener("click", async (e) => {
                    const deleteBtn = e.target.closest(".delete-btn");
                    if (!deleteBtn) return;

                    const reviewId = deleteBtn.dataset.reviewId;
                    const confirmDelete = confirm("정말 이 리뷰를 삭제하시겠어요?");
                    if (!confirmDelete) return;

                    try {
                        const res = await fetch(`/api/reviews/${reviewId}`, { method: "DELETE" });
                        if (res.ok) {
                            // 삭제 성공 시 UI에서 제거
                            deleteBtn.closest(".review-card").remove();
                            showToast("리뷰가 삭제되었어요!", "deleted");
                        } else {
                            alert("삭제에 실패했어요.");
                        }
                    } catch (err) {
                        console.error("삭제 오류:", err);
                        alert("네트워크 오류가 발생했어요.");
                    }
                });

            });



            function appendReview(review) {
                const reviewList = document.getElementById("reviewList");

                const card = document.createElement("article");
                card.className = "review-card animate-in";

                const isLiked = review.likedByCurrentUser;
                const iconClass = isLiked ? "fa-solid" : "fa-regular";
                const likedClass = isLiked ? "review-liked" : "";
                const canDelete = (typeof currentUserId !== 'undefined') && (review.userId === currentUserId);


                card.innerHTML = `
                                    <p><strong>${review.username}</strong> 님의 평가</p>
                                    <p>⭐ ${review.rating}점</p>
                                    <p>${review.content}</p>

                                    <button class="like-btn review-like-btn ${likedClass}" data-review-id="${review.reviewId}">
                                        <i class="like-icon review-like-icon fa-thumbs-up ${iconClass}"></i>
                                        <span class="like-count">${review.likeCount}</span>
                                    </button>
                                ${canDelete ? `
                                    <button class="delete-btn review-delete-btn" data-review-id="${review.reviewId}">
                                        <i class="fa-solid fa-trash delete-icon"></i>
                                    </button>
</button>
                                ` : ''}
                                `;

                reviewList.prepend(card); // 최신순으로 맨 위에 추가
            }


            //추천 버튼



        </script>
    </th:block>
</body>
</html>
