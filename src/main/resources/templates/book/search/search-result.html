<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">


<th:block layout:fragment="meta">
    <title>책 검색</title>
</th:block>


<body>
<div layout:fragment="content">



    <div th:replace = "~{fragments/search-bar :: searchBar(${query})}"></div>


    <section class=search-section>
        <div class=search-container>
            <div class="search-header">
                <h2 th:text="'검색어: ' + ${query}">검색어</h2>
            </div>
            <div class=search-wrapper>
                <!-- 탭 메뉴 -->
                <div class="tab-menu">
                    <a th:href="@{/search(query=${query}, type='actor')}">책</a>
                    <a class="line" th:href="@{book/search(query=${query}, type='post')}">게시글</a>
                </div>


                <div class="search-content">
                    <div id= "book-list-area" class="book-list-area">
                        <div th:replace = "~{book/search/_result-fragment :: resultFragment}"></div>
                    </div>
                </div>


                <nav id = "pagination-area" class="pagination-area">
                    <div th:replace = "~{commons/_pagination-fragment :: paginationFragment(${pageInfo}, ${action})}"></div>
                </nav>

            </div>
        </div>
    </section>

</div>

<th:block layout:fragment="script">
    <script src = "/js/book/book.js"></script>
    <script src = "/js/commons/pagination.js"></script>
</th:block>


</body>
</html>
