<div th:fragment="searchFragment(boardCode)" class="board-search-box">
    <input type="text" id="search-input" class="search-input" placeholder="검색어를 입력하세요"/>
    <select id="searchType" name="searchType">
        <!-- 일반 게시판 검색 옵션 -->


        <option value="all">전체</option>
        <option value="titleContent">제목+내용</option>
        <option value="title">제목</option>
        <option value="content">내용</option>
        <th:block th:if="${boardCode == 3}">
            <option value="host">주최자</option>
        </th:block>
    </select>
    <button type="button" id="search-btn" class="search-btn">🔍</button>
</div>
