<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html"
      th:inline="text">

<th:block layout:fragment="meta">
    <title>건필 - 글 상세</title>
</th:block>


<th:block layout:fragment="css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css"/>
    <link rel="stylesheet" href="/css/contest.css"/>
</th:block>

<body>
<div layout:fragment="content">
    <div class="contest-container-detail">
        <div class="contest-desc-container">

            <div class=contest-detail-title th:text="${post.title}"></div>
            <div class=contest-detail-subtitle th:text="${post.subtitle}"></div>
            <!-- ✅ 상단 요약 -->
            <div class="contest-meta">
                <span class="view-count">조회수: <span th:text="${post.viewCount}">201</span></span>
            </div>


            <div class="contest-desc-wrapper">
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">주관기관</span>
                        <span class="info-value" th:text="${post.hostName}">삼성</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">카테고리</span>
                        <span class="info-value" th:text="${post.categoryName}">카테고리</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">지원대상</span>
                        <span class="info-value" th:text="${post.target}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">신청기간</span>
                        <span class="info-value"  th:text="${#temporals.format(post.startDate, 'yyyy-MM-dd')} + ' ~ ' + ${#temporals.format(post.endDate, 'yyyy-MM-dd')}">
                        <span class="dday" th:text = "${post.dDay}"> </span>
                    </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">총 상금</span>
                        <span class="info-value" th:text="${post.totalPrize}"></span>
                    </div>
                    <div class="info-row">
                         <span class="info-label">1등 상금</span>
                        <span class="info-value" th:text="${post.firstPrize}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">지원링크</span>
                        <span class="info-value">
                            <a th:href="${#strings.startsWith(post.applyUrl, 'http') ? post.applyUrl : 'https://' + post.applyUrl}"
                               target="_blank" class="apply-link-btn">
                              지원링크
                            </a>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">첨부파일</span>
                        <span class="info-value">모집요강.pdf</span>
                    </div>

                    <!-- 필요한 항목 계속 추가 -->
                </div>

                <div class="post-image-wrapper">
                    <img th:src="@{${post.posterUrl}}" alt="포스터 이미지" class="poster-image">
                </div>
            </div>
        </div>

        <div class="post-wrapper">
            <div class="post-content toastui-editor-contents" th:utext="${post.content}"></div>
        </div>

        <div class="post-actions">
            <a th:href="@{/contest/list(boardCode=${boardCode})}" class="basic-btn">📌 목록으로</a>

            <th:block sec:authorize="isAuthenticated()">
                <form th:if="${post.userId == #authentication.principal.id}"
                      th:action="@{/board/delete/{id}(id=${post.postId}, boardCode =${boardCode})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')" style="display: inline;">
                    <button class="delete-btn">삭제</button>
                </form>
                <!-- 수정 -->
                <div th:if="${post.userId == #authentication.principal.id}">
                    <a th:href="@{/contest/edit/{id}(id=${post.postId}, boardCode=${boardCode})}" class="basic-btn">✏️
                        수정</a>
                </div>
            </th:block>
        </div>


    </div>
</div>


<th:block layout:fragment="script">
    <script>

    </script>
</th:block>
</body>
</html>
