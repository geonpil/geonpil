<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">

<!-- Toast UI Editor CSS -->

<!-- Toast UI Editor Script -->
<th:block layout:fragment="meta">
  <title>건필 - 공모전 게시</title>
</th:block>


<th:block layout:fragment="css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="/css/pages/contest/contest.css">
  <link rel="stylesheet" href="/css/pages/board/board.css">
  <link rel="stylesheet" href="/css/components/common.css">
</th:block>


<body>
<div layout:fragment="content">
  <div class="card p-20">
    <h2 class="form-title">✍ 공모전 수정</h2>
    <form id="postForm" th:action="@{/contest/edit/{id}(id=${post.postId})}" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <input type="text" id="title" name="title" th:value="${post.title}" class="form-input" required />
      </div>

      <div class="form-group">
        <input type="text" id="subtitle" name="subtitle" class="form-input" th:value="${post.subtitle}"/>
      </div>

      <div class="form-group">
        <label class="form-label">장르</label>
        <div class="category-checkbox-group">
          <th:block th:each="cat : ${categories}">
            <label class="category-checkbox">
              <input type="checkbox"
                     name="categoryIds"
                     th:value="${cat.id}"
                     th:checked="${post.categoryIdsFromRaw.contains(cat.id)}" />
              <span th:text="${cat.categoryName}">장르명</span>
            </label>
          </th:block>
        </div>
      </div>


      <div class="form-group">
        <input type="text" id="hostName" name="hostName" class="form-input" th:value="${post.hostName}" required />
      </div>

      <div class="form-group">
        <input type="text" id="contactInfo" name="contactInfo" class="form-input" th:value="${post.contactInfo}" required />
      </div>

      <div class="form-group">
        <input type="text" id="totalPrize" name="totalPrize" class="form-input" th:value="${post.totalPrize}"  />
      </div>

      <div class="form-group">
        <input type="text" id="applyUrl" name="applyUrl" class="form-input" th:value="${post.applyUrl}"  />
      </div>

      <div class="form-group">
        <label for="posterFile">포스터 이미지</label>
        <img id="poster-preview" th:if="${post.posterUrl}" th:src="@{${post.posterUrl}}" style="max-width: 200px; display: block; margin-bottom: 10px; cursor: pointer;" onclick="openImageModal(this)">
        <button type="button" id="remove-poster-btn" class="delete-btn">포스터 제거</button>
        <input class ="img-upload" type="file" id="posterFile" name="posterFile" accept="image/*" />
        <input type="hidden" id="existingPosterUrl" name="existingPosterUrl" th:value="${post.posterUrl}" />
      </div>

      <!-- 기존 첨부파일 목록 -->
      <div class="form-group">
        <label>기존 첨부파일</label>
        <script th:inline="javascript">
          console.log("첨부파일 데이터:", /*[[${attachments}]]*/ null);
        </script>
        <div th:if="${attachments != null and !#lists.isEmpty(attachments)}">
          <ul class="attachment-list">
            <li th:each="att : ${attachments}" class="attachment-item">
              <span th:text="${att.originalName}" style="margin-right: 10px;"></span>
              <small th:text="'(' + ${att.fileSize} + ' bytes)'" style="color: #666; margin-right: 10px;"></small>
              <label class="delete-label">
                <input type="checkbox" name="deleteAttachmentIds" th:value="${att.attachmentId}" />
                삭제
              </label>
            </li>
          </ul>
        </div>
        <div th:if="${attachments == null or #lists.isEmpty(attachments)}">
          <p style="color:#888">첨부된 파일이 없습니다.</p>
        </div>
      </div>

      <!-- 새 첨부파일 -->
      <div class="form-group">
        <label for="files">새 파일 추가 (이미지, PDF)</label>
        <input type="file" id="files" name="files" multiple accept="image/*,application/pdf" class="form-input" />
      </div>

      <div class="form-group">
        <label>공모 기간</label>
        <div class="date-range">
          <input type="date" id="startDate" name="startDate" th:value="${post.startDate}" required>
          <span class="date-separator">~</span>
          <input type="date" id="endDate" name="endDate" th:value="${post.endDate}">
          <label class="checkbox-label">
            <input type="checkbox" id="endDateUndefined">
            마감일 미정
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>내용</label>
        <div id="editor"></div>
        <input type="hidden" id="original-content" th:value="${post.content}" />
      </div>

      <!-- 버튼 -->
      <div class="form-buttons">
        <button type="submit" class="basic-btn">수정 완료</button>
        <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
      </div>

      <input type="hidden" name="boardCode" th:value="${boardCode}">
      <input type="hidden" name="postId" th:value="${post.postId}">
      <input type="hidden" name="content" id="content-hidden" />
    </form>
  </div>

  <!-- 이미지 모달 (form 밖으로 이동) -->
  <div id="imageModal" class="image-modal">
    <span class="close-modal" onclick="closeImageModal()">&times;</span>
    <img class="modal-content" id="expandedImg">
  </div>
</div>

<th:block layout:fragment="script">
  <!-- 공통 toast editor 초기화 -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/toast-editor.js"></script>
  <script src="/js/contest/setDate.js"></script>
  <script src="/js/commons/modal.js"></script>
  <script>


    document.addEventListener("DOMContentLoaded", function () {
      initContestDateFields();

      const form = document.getElementById("postForm");
      const hiddenContent = document.getElementById("content-hidden");

      form.addEventListener("submit", function (e) {
        // 날짜 검증
        const today = new Date();
        const start = new Date(document.getElementById("startDate").value);
        const end = new Date(document.getElementById("endDate").value);
        today.setHours(0,0,0,0);
        if (end <= today) {
          alert("종료일은 오늘보다 이후여야 합니다.");
          e.preventDefault();
          return;
        }
        if (end < start) {
          alert("시작일은 종료일 이전이어야 합니다.");
          e.preventDefault();
          return;
        }

        // content는 toast-editor.js에서 처리됨
      });

      // 마감일 미정 체크박스 처리
      const endDateInput = document.getElementById("endDate");
      const endDateUndefined = document.getElementById("endDateUndefined");
      endDateUndefined.addEventListener("change", function () {
        if (this.checked) {
          endDateInput.disabled = true;
          endDateInput.value = "";
        } else {
          endDateInput.disabled = false;
        }
      });

      // 포스터 미리보기 & 제거
      document.getElementById("posterFile").addEventListener("change", function () {
        const preview = document.getElementById("poster-preview");
        const removePosterBtn = document.getElementById("remove-poster-btn");
        if (this.files && this.files[0] && preview) {
          preview.src = URL.createObjectURL(this.files[0]);
          preview.style.display = "block";
          // 새 포스터 선택 시 제거 버튼 다시 표시
          if (removePosterBtn) {
            removePosterBtn.style.display = "inline-block";
          }
        }
      });

      // 포스터 제거 버튼 이벤트
      const removePosterBtn = document.getElementById("remove-poster-btn");
      if (removePosterBtn) {
        console.log("포스터 제거 버튼 찾음");
        removePosterBtn.addEventListener("click", function (e) {
          console.log("포스터 제거 버튼 클릭됨");
          e.preventDefault();
          
          const preview = document.getElementById("poster-preview");
          const posterFile = document.getElementById("posterFile");
          const existingPosterUrl = document.getElementById("existingPosterUrl");
          
          if (preview) {
            preview.src = "";
            preview.style.display = "none";
            console.log("포스터 미리보기 제거됨");
          }
          
          // 제거 버튼도 숨김
          removePosterBtn.style.display = "none";
          
          if (posterFile) {
            posterFile.value = "";
            console.log("포스터 파일 입력 초기화됨");
          }
          
          if (existingPosterUrl) {
            existingPosterUrl.value = "";
            console.log("기존 포스터 URL 초기화됨");
          }
        });
      } else {
        console.log("포스터 제거 버튼을 찾을 수 없음");
      }
    });
  </script>
</th:block>
</body>
</html>
