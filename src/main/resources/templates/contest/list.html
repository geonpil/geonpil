<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:utils="http://www.thymeleaf.org/extras/java8time"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      th:inline="text">

<th:block layout:fragment="meta">
    <title>건필 - 공모전 목록</title>
</th:block>

<th:block layout:fragment="css">
    <link rel="stylesheet" href="/css/contest.css"/>
</th:block>

<body>
<div layout:fragment="content">
    <div class="board-container">
        <h2 class="board-header">📢 공모전</h2>

<!--        장르필터-->
        <div class="category-filter">
            <button class="category-btn"
                    data-id=""
                    onclick="selectAllCategories(this)">
                전체
            </button>

            <button type="button"
                    th:each="cat : ${categories}"
                    th:data-id="${cat.id}"
                    th:text="${cat.categoryName}"
                    class="category-btn"
                    onclick="toggleCategory(this)">
            </button>
        </div>


        <div class="sort-filter">
            <div class ="sort-buttons">
                <button class="sort-btn" data-sort="recent" onclick="changeSort(this)">최신순</button>
                <button class="sort-btn" data-sort="deadline" onclick="changeSort(this)">마감 임박순</button>
            </div>


            <label for ="isClosedIncluded" class="closed-checkbox">
                <input type="checkbox" id="isClosedIncluded" onclick = "changeShow()">
                <span>마감된 공모전 포함</span>
            </label>
        </div>



        <div th:replace="~{contest/_contest-list-fragment :: contestListFragment(${contests}, ${currentPage}, ${totalPages}, ${boardCode})}">
        </div>


        <div class="contest-footer">
            <div class="contest-upload">
                <a th:href="@{/contest/write(boardCode=${boardCode})}" class="basic-btn">✍ 공모전 게시</a>
            </div>
        </div>
    </div>
    <input type="hidden" id="boardCode" th:value="${boardCode}"/>
</div>

<th:block layout:fragment="script">
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            bindContestClickEvents();

             // ✅ '전체' 버튼에 .active 클래스 부여
            const allBtn = document.querySelector('.category-btn[data-id=""]');
            if (allBtn) allBtn.classList.add("active");

           const recentSortBtn = document.querySelector('.sort-btn[data-sort="recent"]');
            if (recentSortBtn) recentSortBtn.classList.add("active");
        });

        function bindContestClickEvents() {
          document.querySelectorAll(".contest-row").forEach(row => {
            row.addEventListener("click", function () {
              const id = this.dataset.id;
              if (id) {
                const boardCode = document.getElementById("boardCode")?.value;
                window.location.href = `/contest/detail/${id}?boardCode=${boardCode}`;
              }
            });
          });
        }



        const selectedCategories = new Set();
        let currentSort = "recent";
        let isClosedIncluded =  document.getElementById("isClosedIncluded").checked;


        function toggleCategory(btn) {
          const id = btn.dataset.id;

          // 전체 버튼 비활성화
          document.querySelector('.category-btn[data-id=""]').classList.remove("active");

          if (selectedCategories.has(id)) {
            selectedCategories.delete(id);
            btn.classList.remove("active");
          } else {
            selectedCategories.add(id);
            btn.classList.add("active");
          }

          fetchFilteredPosts();
        }

        function selectAllCategories(btn) {
          document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedCategories.clear();
          fetchFilteredPosts();
        }

        function highlightSelectedButtons() {
          document.querySelectorAll(".category-btn").forEach(btn => {
            const id = btn.dataset.id;
            if (id === "") {
              btn.classList.toggle("active", selectedCategories.size === 0);
            } else {
              btn.classList.toggle("active", selectedCategories.has(id));
            }
          });
        }


        function fetchFilteredPosts(page = 1) {
          const params = new URLSearchParams();

          if (selectedCategories.size > 0) {
            params.set("categoryIds", Array.from(selectedCategories).join(","));
          }

          const boardCode = new URLSearchParams(window.location.search).get("boardCode");
          if (boardCode) {
            params.set("boardCode", boardCode);
          }

          params.set("page", page);
          params.set("sort", currentSort);
          params.set("isClosedIncluded", isClosedIncluded);




          fetch("/contest/list/fragment?" + params.toString())
            .then(res => res.text())
            .then(html => {
              document.getElementById("contest-list").innerHTML = html;
              highlightSelectedButtons();
              bindContestClickEvents();
            })
            .catch(err => console.error("게시글 불러오기 실패", err));
        }



        function changeSort(btn) {
          document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          currentSort = btn.dataset.sort;
          fetchFilteredPosts(); // 정렬 기준 포함해서 재요청
        }

        function changeShow() {
            isClosedIncluded =  document.getElementById("isClosedIncluded").checked;
            fetchFilteredPosts()
        }

    </script>
</th:block>
</body>
</html>
