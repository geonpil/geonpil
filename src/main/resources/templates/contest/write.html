<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">

<!-- Toast UI Editor CSS -->

<!-- Toast UI Editor Script -->
<th:block layout:fragment="meta">
  <title>건필 - 공모전 게시</title>
</th:block>


<th:block layout:fragment="css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="/css/contest.css">
</th:block>


<body>
<div layout:fragment="content">
  <div class="write-card">
    <h2 class="form-title">✍ 공모전 글쓰기</h2>
    <form id="postForm">
      <div class="form-group">
        <input type="text" id="title" name="title" class="form-input" placeholder="제목을 입력하세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="subtitle" name="subtitle" class="form-input" placeholder="부제목을 입력하세요."/>
      </div>

<!--      <div class="form-group">-->
<!--        <select id="categoryId" name="categoryId" required class="form-select">-->
<!--          <option value="">&#45;&#45; 분류 선택 &#45;&#45;</option>-->
<!--          <th:block th:each="cat : ${categories}">-->
<!--            <option th:value="${cat.id}" th:text="${cat.categoryName}"></option>-->
<!--          </th:block>-->
<!--        </select>-->
<!--      </div>-->

      <div class="form-group">
        <label class="form-label">장르</label>
        <div class="category-checkbox-group">
          <th:block th:each="cat : ${categories}">
            <label class="category-checkbox">
              <input type="checkbox"
                     name="categoryIds"
                     th:value="${cat.id}">
              <span th:text="${cat.categoryName}">장르명</span>
            </label>
          </th:block>
        </div>
      </div>


      <div class="form-group">
        <input type="text" id="hostName" name="hostName" class="form-input" placeholder="주최/주관사를 입력해주세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="contactInfo" name="contactInfo" class="form-input" placeholder="문의 주소(문의 이메일, 연락처 등)을 입력해주세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="totalPrize" name="totalPrize" class="form-input" placeholder="총 상금을 입력해주세요."  />
      </div>

      <div class="form-group">
        <input type="text" id="applyUrl" name="applyUrl" class="form-input" placeholder="지원 링크를 입력해주세요."  />
      </div>

      <div class="form-group">
        <label for="posterFile">포스터 이미지</label>
        <input type="file" id="posterFile" accept="image/*">
      </div>

      <div class="form-group">
        <label>공모 기간</label>
        <div class="date-range">
          <input type="date" id="startDate" name="startDate" required>
          <span class="date-separator">~</span>
          <input type="date" id="endDate" name="endDate">
          <label class="checkbox-label">
            <input type="checkbox" id="endDateUndefined">
            마감일 미정
          </label>
        </div>
      </div>

      <div class="form-group">
        <div id="editor" class="form-editor"></div>
      </div>

      <!-- 버튼 -->
      <div class="form-buttons">
        <button type="button" id = "submit-btn" class="basic-btn">등록</button>
        <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
      </div>

      <input type="hidden" id="boardCode" th:value="${boardCode}">
    </form>
  </div>
</div>

<th:block layout:fragment="script">
  <!-- 공통 toast editor 초기화 -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/toast-editor-rest.js"></script>
  <script>
    const startDate= document.getElementById("startDate");
    const endDate = document.getElementById("endDate");
    const today = new Date();


    document.addEventListener("DOMContentLoaded", function () {
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;

        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        const tmm = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const tdd = String(tomorrow.getDate()).padStart(2, '0');
        const tomorrowStr = `${yyyy}-${tmm}-${tdd}`;

<!--        startDate.setAttribute("max", todayStr);     // 시작일은 오늘까지만-->
        endDate.setAttribute("min", tomorrowStr);    // 종료일은 내일부터
      });


document.getElementById("submit-btn").addEventListener("click", async function () {
      const start = new Date(startDate.value);
      const end = new Date(endDate.value);
      today.setHours(0, 0, 0, 0);

    <!--  if (start > today) {-->
    <!--    alert("시작일은 오늘 이후로 설정할 수 없습니다.");-->
    <!--    return;-->
    <!--  }-->

      if (end <= today) {
        alert("종료일은 오늘보다 이후여야 합니다.");
        return;
      } else if(end < start) {
        alert("시작일은 종료일 이전이어야 합니다.");
        return;
      }


      const checkedCategoryInputs = document.querySelectorAll('input[name="categoryIds"]:checked');
      const categoryIds = Array.from(checkedCategoryInputs).map(input => input.value);

      const data = {
        title: document.getElementById("title").value,
        subtitle: document.getElementById("subtitle").value,
        startDate: document.getElementById("startDate").value,
        endDate: document.getElementById("endDate").value,
        hostName: document.getElementById("hostName").value,
        totalPrize: document.getElementById("totalPrize").value,
        boardCode: document.getElementById("boardCode").value,
        applyUrl : document.getElementById("applyUrl").value,
        contactInfo : document.getElementById("contactInfo").value,
        categoryIds: categoryIds
      };

      const posterFile = document.getElementById("posterFile").files[0];
      if (posterFile) {
        data.posterUrl = await uploadPosterFile(posterFile); // ✅ OK now
      }

      submitToastEditor(data);
    });



 document.addEventListener("DOMContentLoaded", function () {
  const endDateInput = document.getElementById("endDate");
  const endDateUndefined = document.getElementById("endDateUndefined");

  endDateUndefined.addEventListener("change", function () {
    if (this.checked) {
      endDateInput.disabled = true;
      endDateInput.value = ""; // 필드 비움
    } else {
      endDateInput.disabled = false;
    }
  });
});

async function uploadPosterFile(file) {
  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("/upload-image", {
    method: "POST",
    body: formData
  });

  const result = await res.json();
  return result.url;
}



  </script>
</th:block>
</body>
</html>
