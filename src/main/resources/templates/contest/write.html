<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">

<!-- Toast UI Editor CSS -->

<!-- Toast UI Editor Script -->
<th:block layout:fragment="meta">
  <title>건필 - 공모전 게시</title>
</th:block>


<th:block layout:fragment="css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="/css/pages/contest/contest.css">
</th:block>


<body>
<div layout:fragment="content">
  <div class="card p-20">
    <h2 class="form-title">✍ 공모전 글쓰기</h2>
    <form id="postForm" action="/contest/write/save" method="post" enctype="multipart/form-data">
      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}" />
      <div class="form-group">
        <input type="text" id="title" name="title" class="form-input" placeholder="제목을 입력하세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="subtitle" name="subtitle" class="form-input" placeholder="부제목을 입력하세요."/>
      </div>


      <div class="form-group">
        <label class="form-label">장르</label>
        <div class="category-checkbox-group">
          <th:block th:each="cat : ${categories}">
            <label class="category-checkbox">
              <input type="checkbox"
                     name="categoryIds"
                     th:value="${cat.id}">
              <span th:text="${cat.categoryName}">장르명</span>
            </label>
          </th:block>
        </div>
      </div>


      <div class="form-group">
        <input type="text" id="hostName" name="hostName" class="form-input" placeholder="주최/주관사를 입력해주세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="contactInfo" name="contactInfo" class="form-input" placeholder="문의 주소(문의 이메일, 연락처 등)을 입력해주세요." required />
      </div>

      <div class="form-group">
        <input type="text" id="totalPrize" name="totalPrize" class="form-input" placeholder="총 상금을 입력해주세요."  />
      </div>

      <div class="form-group">
        <input type="text" id="applyUrl" name="applyUrl" class="form-input" placeholder="지원 링크를 입력해주세요."  />
      </div>

      <div class="form-group">
        <label for="posterFile">포스터 이미지</label>
        <input type="file" id="posterFile" name="posterFile" accept="image/*">
      </div>

      <!-- 첨부 파일 -->
      <div class="form-group">
        <label for="files">첨부 파일 (이미지, PDF)</label>
        <input type="file" id="files" name="files" multiple accept="image/*,application/pdf" class="form-input"/>
      </div>

      <div class="form-group">
        <label>공모 기간</label>
        <div class="date-range">
          <input type="date" id="startDate" name="startDate" required>
          <span class="date-separator">~</span>
          <input type="date" id="endDate" name="endDate">
          <label class="checkbox-label">
            <input type="checkbox" id="endDateUndefined">
            마감일 미정
          </label>
        </div>
      </div>

      <div class="form-group">
        <div id="editor" class="form-editor"></div>
      </div>

      <!-- 버튼 -->
      <div class="form-buttons">
        <button type="submit" class="basic-btn">등록</button>
        <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
      </div>

      <input type="hidden" name="boardCode" th:value="${boardCode}">
      <input type="hidden" name="content" id="content-hidden" />
    </form>
  </div>
</div>

<th:block layout:fragment="script">
  <!-- 공통 toast editor 초기화 -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/js/toast-editor.js"></script>
  <script src="/js/contest/setDate.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      initContestDateFields();

      const form = document.getElementById("postForm");
      form.addEventListener("submit", function (e) {
        const today = new Date();
        const start = new Date(document.getElementById("startDate").value);
        const end = new Date(document.getElementById("endDate").value);
        today.setHours(0, 0, 0, 0);

        if (end <= today) {
          alert("종료일은 오늘보다 이후여야 합니다.");
          e.preventDefault();
          return;
        } else if (end < start) {
          alert("시작일은 종료일 이전이어야 합니다.");
          e.preventDefault();
          return;
        }
      });

          // 마감일 미정 체크박스
          const endDateInput = document.getElementById("endDate");
          const endDateUndefined = document.getElementById("endDateUndefined");
          if (endDateUndefined) {
            endDateUndefined.addEventListener("change", function () {
              if (this.checked) {
                endDateInput.disabled = true;
                endDateInput.value = "";
              } else {
                endDateInput.disabled = false;
              }
            });
          }

       });
  </script>
</th:block>
</body>
</html>
