<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout.html">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 찾기</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    #sendCodeBtn:disabled {
      background-color: #ddd;
      color: #888;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
<div layout:fragment="content">
  <div class = "form-card">
    <h2 style="text-align: center;">비밀번호 찾기</h2>
    <br>
    <form id="findPasswordForm">

      <!-- 이메일 입력 -->
      <div class="form-group">
        <label for="email">가입한 이메일 주소를 입력해주세요.</label>
        <div style="display: flex; gap: 5px;">
          <input type="email" id="email" name="email" required style="flex:1;" placeholder="이메일 입력">
          <button type="button" id="checkEmailBtn" class = "basic-btn" onclick="checkEmailValid()">확인</button>
        </div>
        <div id="email-check" style="font-size: 0.85rem; margin-top: 5px;"></div>
      </div>

      <!-- 인증코드 입력 -->
      <div id="verification-section" class ="form-group" style="display:none;">
        <input type="text" id="verification-code" placeholder="인증코드 입력" style="width:70%;">
        <button type="button" id = "verification-btn" class = "basic-btn" onclick="verifyCode()">확인</button>
        <div id="verification-check" style="font-size: 0.85rem; margin-top: 5px;"></div>
        <div id="timer" style="font-size: 0.85rem; color: gray; margin-top: 5px;"></div> <!-- 추가! -->
        <a href="#" id="resend-link" onclick="resendVerificationCode()" style="display:none;">인증코드가 도착하지 않았나요? 여기를 눌러 재전송하기</a>
      </div>

      <!-- 비밀번호 재설정 이동 버튼 -->
      <div style="margin-top: 20px;">
        <button id="resetPasswordBtn" class = "basic-btn" type="button" onclick="goToResetPage()" disabled style="display : none">
          비밀번호 재설정
        </button>
        <button id="sendCodeBtn" class = "basic-btn" type="button" onclick="sendVerificationCode()" disabled>
          이메일로 인증코드 받기
        </button>
      </div>

    </form>
  </div>
</div>


<th:block layout:fragment="script">
<script>
  let sentCode = "";
  let verifiedEmail = false;
  let emailValid = false;
  let emailRegistered = false;
  let timer;
  let timeLeft = 300; // 5분

  let verificationInput = document.getElementById("verification-code"); //입력버튼


function updateSendButton() {
    const btn = document.getElementById("sendCodeBtn");
    btn.disabled = !(emailValid && emailRegistered);
  }

function updateResetButton() {
  const resetBtn = document.getElementById("resetPasswordBtn");
  resetBtn.disabled = !verifiedEmail;
}


function sendVerificationCode() {
  const email = document.getElementById("email").value;

  csrfFetch(`/verify/find/send-code`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `email=${encodeURIComponent(email)}`
  })
    .then(res => res.text())
    .then(code => {
      sentCode = code;
      alert("인증코드가 이메일로 전송되었습니다!");
      document.getElementById("verification-section").style.display = "block";
       verificationInput.style.display = "inline";
      startTimer();
      // 이메일 입력칸 + 확인버튼 숨김
      document.getElementById("email").style.display = "none";
      document.getElementById("checkEmailBtn").style.display = "none";
      document.getElementById("email-check").style.display = "none"; // 이메일 확인
      document.getElementById("verification-check").innerText = "" //만료 텍스트 제거
      document.getElementById("resetPasswordBtn").style.display = "block"; //비밀번호 재설정버튼
      document.getElementById("resend-link").style.display = "block"; //재전송버튼
      document.getElementById("timer").style.display = "block";  // 타이머
      document.getElementById("verification-btn").style.display = "inline"; //인증번호 확인버튼


      // 버튼 텍스트를 변경
      document.getElementById("sendCodeBtn").style.display = "none";;
    });
}

function resendVerificationCode() {
  sendVerificationCode(); // 다시 발송
  startTimer();
}


function verifyCode() {
  const inputCode = document.getElementById("verification-code").value;
  const msg = document.getElementById("verification-check");

  if (inputCode === sentCode) {
    msg.innerText = "✅ 인증 성공!";
    msg.style.color = "green";
    verifiedEmail = true;

    // 이제 비밀번호 재설정 버튼 활성화
    const sendBtn = document.getElementById("resetPasswordBtn");
    sendBtn.disabled = false;

    //확인버튼 및 코드 입력창안보이게
    document.getElementById("verification-code").style.display = "none";
    document.getElementById("verification-btn").style.display = "none";
    document.getElementById("resend-link").style.display = "none";

    // 비밀번호 재설정 페이지로 이동할 수 있게 onclick 바꿔치기
    clearInterval(timer);
    document.getElementById("timer").style.display = "none";
  } else {
    msg.innerText = "❌ 인증코드가 일치하지 않습니다.";
    msg.style.color = "red";
    verifiedEmail = false;
  }
}

function goToResetPage() {
  csrfFetch('/verify/find/start-reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `email=${encodeURIComponent(document.getElementById("email").value)}`
  })
  .then(response => {
    if (response.ok) {
      location.href = '/verify/find/reset-password';
    } else {
      alert('세션 저장 실패! 다시 시도해주세요.');
    }
  });
}


function checkEmailValid() {
  const email = document.getElementById("email").value;
  const msg = document.getElementById("email-check");

  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!regex.test(email)) {
    msg.innerText = "유효하지 않은 이메일 형식입니다.";
    msg.style.color = "red";
    emailValid = false;
    emailRegistered = false;
    updateSendButton();
    return;
  } else {
    emailValid = true; // 포맷은 통과했으니 다음 검사 진행
    csrfFetch(`/verify/email?email=${encodeURIComponent(email)}`)
      .then(res => res.text())
      .then(result => {
        if (result === "duplicate") {
          msg.innerText = "✅ 인증 완료되었습니다.";
          msg.style.color = "green";
          emailRegistered = true;
          document.getElementById("email").disabled = true;
          document.getElementById("checkEmailBtn").disabled = true;
        } else {
          msg.innerText = "등록되지 않은 이메일입니다.";
          msg.style.color = "red";
          emailRegistered = false;
        }
        updateSendButton();
      });
    }
}


function startTimer() {
  clearInterval(timer);
  timeLeft = 180;
  timer = setInterval(() => {
    if (timeLeft <= 0) {
      clearInterval(timer);
      sentCode = ""; // 코드 무효화
      document.getElementById("verification-check").innerText = "❗ 인증코드가 만료되었습니다. 다시 요청해주세요.";
      document.getElementById("verification-check").style.color = "red";
      document.getElementById("timer").style.display = "none";
      document.getElementById("verification-btn").style.display = "none";
      verificationInput.style.display = "none";
      verifiedEmail = false;
      updateResetButton();
    } else {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById("timer").innerText = `남은 시간: ${minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
    }
    timeLeft--;
  }, 1000);
}



</script>
</th:block>

</body>
</html>
