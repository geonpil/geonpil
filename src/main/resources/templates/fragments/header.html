<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
<th:block th:fragment="header">
  <header>
    <div class ="header">
      <div class="header-inner">

        <!-- 로고 -->
        <div class="header-left">
          <a href="/" style="display: flex; align-items: center; text-decoration: none; color: white;">
            <img src="/images/header_logo_white.png" alt="건필 로고" style="width: 60px;">
            <div style="display: flex; flex-direction: row; align-items: flex-end;">
              <span style="font-size: 2rem; font-weight: 700; font-family: 'Batang', serif;">건필</span>
              <span style="font-size: 1rem; font-weight: 300; font-family: 'Batang', serif; margin-left: 0.2rem; margin-bottom: 0.5rem;">베타</span>
            </div>
          </a>
        </div>

        <!-- 메뉴 -->
        <div class="header-center" th:if="${not (requestUri == '/signup' or requestUri == '/login' or requestUri == '/find-password' or requestUri == '/reset-password')}">
          <a href="/board/list?boardCode=1">커뮤니티</a>
          <a href="/contest/list?boardCode=3">공모전</a>
          <a href="/board/list?boardCode=2">도전건필</a>
        </div>

        <!-- 로그인 / 회원가입 or 닉네임 -->
        <div class="header-right" th:if="${not (requestUri == '/signup' or requestUri == '/login' or requestUri == '/find-password' or requestUri == '/reset-password')}">

          <!-- 비회원 -->
          <th:block sec:authorize="isAnonymous()">
            <a href="/login" style="color: white; font-size: 0.95rem; text-decoration: none; margin-right: 10px;">로그인</a>
            <a href="/signup" style="color: white; font-size: 0.95rem; text-decoration: none;">회원가입</a>
          </th:block>

          <!-- 로그인 사용자 -->
          <th:block sec:authorize="isAuthenticated()">
            <div class="user-menu-wrapper">
              <button id="userDropdownToggle" class="user-nickname-btn" th:text="${nickname} +' 님'">닉네임</button>
              <ul id="userDropdown" class="user-dropdown hidden">
                <li><a th:href="@{/mypage}">마이페이지</a></li>
                <li><a th:href="@{/my-posts}">내가 쓴 글</a></li>
                <li><a th:href="@{/logout}">로그아웃</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/main}">관리자메뉴</a></li>
              </ul>
            </div>
          </th:block>

        </div>

      </div>
    </div>
  </header>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggleBtn = document.getElementById("userDropdownToggle");
      const dropdown = document.getElementById("userDropdown");

      toggleBtn.addEventListener("click", function () {
        dropdown.classList.toggle("hidden");
      });

      // 드롭다운 밖 클릭 시 닫기
      document.addEventListener("click", function (e) {
        if (!toggleBtn.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.add("hidden");
        }
      });
    });
  </script>
</th:block>

</body>
</html>
