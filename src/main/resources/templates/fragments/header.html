<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <style>
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-center, .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
  </style>
</head>

<body>
<th:block th:fragment="header">
  <header>
    <div class ="header">
      <div class="header-inner">

        <!-- 로고 -->
        <div class="header-left">
          <a href="/" style="display: flex; align-items: center; text-decoration: none; color: white;">
            <img src="/images/header_logo_white.png" alt="건필 로고" style="width: 60px;">
            <span style="font-size: 2rem; font-weight: 700; font-family: 'Batang', serif;">건필</span>
          </a>
        </div>

        <!-- 메뉴 -->
        <div class="header-center" th:if="${not (requestUri == '/signup' or requestUri == '/login' or requestUri == '/find-password' or requestUri == '/reset-password')}">
          <a href="#">커뮤니티</a>
          <a href="#">공모전</a>
          <a href="#">도전건필</a>
        </div>

        <!-- 로그인 / 회원가입 or 닉네임 -->
        <div class="header-right" th:if="${not (requestUri == '/signup' or requestUri == '/login' or requestUri == '/find-password' or requestUri == '/reset-password')}">

          <!-- 비회원 -->
          <th:block sec:authorize="isAnonymous()">
            <a href="/login" style="color: white; font-size: 0.95rem; text-decoration: none; margin-right: 10px;">로그인</a>
            <a href="/signup" style="color: white; font-size: 0.95rem; text-decoration: none;">회원가입</a>
          </th:block>

          <!-- 로그인 사용자 -->
          <th:block sec:authorize="isAuthenticated()">
            <span style="color: white;" sec:authentication="principal.nickname"></span>님
            <form th:action="@{/logout}" method="post" style="display:inline;">
              <button type="submit" style="background:none; border:none; color:white; cursor:pointer; font-size:0.95rem;">로그아웃</button>
            </form>
          </th:block>

        </div>

      </div>
    </div>
  </header>
</th:block>
</body>
</html>
</html>
