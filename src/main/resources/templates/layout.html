<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">


<!-- layout.html -->
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ 메타데이터 슬롯 -->
    <th:block layout:fragment="meta">
        <title>건필</title> <!-- 기본 제목 -->
        <!-- Open Graph 기본값: 각 페이지에서 동일 키로 덮어쓸 수 있음 -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="건필" />
        <meta property="og:title" content="건필" />
        <meta property="og:description" content="책, 글, 공모전 커뮤니티 건필" />
        <!-- 절대경로 권장: 호스트 자동 감지용 Thymeleaf 표현 사용 -->
        <meta property="og:url" th:content="@{/}" />
        <!-- 기본 이미지: 페이지에서 덮어쓰기 가능. 크롤러 호환을 위해 절대 URL 제공 -->
        <meta property="og:image" th:content="@{|/images/ogImage/preview.png|}" />
        <meta property="og:image:secure_url" th:content="@{|/images/ogImage/preview.png|}" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:locale" content="ko_KR" />
        <!-- 카카오/트위터 호환 -->
        <meta name="twitter:card" content="summary_large_image" />
    </th:block>

    <!-- ✅ CSRF 토큰 (Ajax에서 사용) -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- ✅ CSS 슬롯 -->
    <th:block layout:fragment="css"></th:block>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/components/author-dropdown.css" />
    <link rel="stylesheet" href="/css/components/popular-keywords-sidebar.css" />
</head>



<body>
    <div th:replace="~{fragments/header :: header(requestUri=${requestUri})}"></div>

    <div class="main-wrapper">
    <main layout:fragment="content" class="main-container"></main>
        <div th:replace="~{fragments/_popular-keywords-sidebar :: popularKeywordsSidebar}"></div>
    </div>

    <div th:replace="~{fragments/footer :: footer(requestUri=${requestUri})}"></div>

    <th:block layout:fragment="script"></th:block>

    <!-- CSRF fetch util -->
    <script src="/js/commons/csrf-fetch.js"></script>

    <div class="bug-report-btn-wrapper">
        <a href="/bug-report" class="bug-report-btn" target="_blank">🐞 버그 제보 및 개선 사항 남기기</a>
    </div>
</body>

</html>
