<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<th:block layout:fragment="meta">
    <title>건필</title>
    <!-- 메인 페이지 전용 OG 메타 (레이아웃 기본값을 덮어씀) -->
    <meta property="og:title" content="건필 - 함께 쓰고 읽는 커뮤니티" />
    <meta property="og:description" content="책 리뷰, 커뮤니티, 공모전 소식까지 한 곳에서." />
    <meta property="og:image" th:content="@{|/images/ogImage/preview.png|}" />
</th:block>


<th:block layout:fragment="css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="/css/pages/board/board.css"/>
    <link rel="stylesheet" href="/css/pages/main.css"/>
    <!-- Swiper JS -->
</th:block>

<body data-mode = "main">
<div layout:fragment="content">
    <div th:replace = "~{fragments/search-bar :: searchBar(${query})}"></div>
    <section class="banner-section">
        <div class="banner-container">
            <div class="main-banner" th:if="${mainBanner != null}">
                <a th:if="${mainBanner.linkUrl != null and !mainBanner.linkUrl.isEmpty()}" th:href="${mainBanner.linkUrl}" target="_blank" rel="noopener noreferrer">
                    <img th:src="${mainBanner.imageUrl}" th:alt="${mainBanner.altText}" />
                </a>
                <img th:if="${mainBanner.linkUrl == null or mainBanner.linkUrl.isEmpty()}" th:src="${mainBanner.imageUrl}" th:alt="${mainBanner.altText}" />
            </div>
            <div class="main-banner banner-empty" th:if="${mainBanner == null}">
                <div class="banner-empty-message">등록된 배너가 없습니다.</div>
            </div>
            <div class="sub-banners desktop-sub-banner" th:if="${!#lists.isEmpty(subBanners)}">
                <div th:each="banner : ${subBanners}">
                    <a th:if="${banner.linkUrl != null and !banner.linkUrl.isEmpty()}" th:href="${banner.linkUrl}" target="_blank" rel="noopener noreferrer">
                        <img th:src="${banner.imageUrl}" th:alt="${banner.altText}" />
                    </a>
                    <img th:if="${banner.linkUrl == null or banner.linkUrl.isEmpty()}" th:src="${banner.imageUrl}" th:alt="${banner.altText}" />
                </div>
            </div>
            <div class="sub-banners desktop-sub-banner" th:if="${#lists.isEmpty(subBanners)}">
                <div class="banner-empty" th:each="i : ${#numbers.sequence(1,4)}">
                    <div class="banner-empty-message">등록된 배너가 없습니다.</div>
                </div>
            </div>
        </div>

        <!-- 모바일 전용 Swiper -->
        <div class="sub-banners swiper-container mobile-sub-banner" th:if="${!#lists.isEmpty(subBanners)}">
            <div class="swiper-wrapper">
                <div class="swiper-slide" th:each="banner : ${subBanners}">
                    <img th:src="${banner.imageUrl}" th:alt="${banner.altText}" />
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="sub-banners mobile-sub-banner banner-empty" th:if="${#lists.isEmpty(subBanners)}">
            <div class="banner-empty-message">등록된 배너가 없습니다.</div>
        </div>

    </section>


    <section class="books-section">
        <!--최근 리뷰 책-->
        <div class="latest-books-section card">
            <div class ="latest-books-container" style ="margin-bottom: 0px;">
                <header class ="latest-books-header card-header">  최근 리뷰가 달린 책</header>

                <div class="swiper-container book-carousel">
                    <div class ="latest-books-wrapper swiper-wrapper">
                        <div class="latest-book-card swiper-slide" th:each="book : ${lastestReviewedBooks}">
                                <a th:href="@{/books/isbn/{isbn}(isbn=${book.isbn})}" style="text-decoration: none; color: inherit;">
                                <!-- 썸네일 -->
                                <img th:src="${book.thumbnail}" alt="책 표지" width="150" height="200" style="object-fit: cover;"/>

                                <!-- 책 정보 -->
                                <div>
                                    <div class="book-title clamp-2"><strong  th:text="${book.title}">제목</strong></div>
                                    <div class="book-author clamp-1" th:text="${book.processedAutors}">저자</div>
                                </div>

                                <p>⭐<span th:text = "${book.rating}"></span></p>
                            </a>
                        </div>
                    </div>

                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
            </div>
        </div>
        <!--건필 픽-->
        <div class="recommended-books-section card">

            <div class ="recommended-books-container" style ="margin-bottom: 0px;">
                <header class ="recommend-books-header card-header">건필 Pick</header>


                <div class="swiper-container book-pick-carousel">
                    <div class ="latest-books-wrapper swiper-wrapper">
                        <div class="latest-book-card swiper-slide" th:each="bookPick : ${bookPicks}">
                            <a th:href="@{/books/isbn/{isbn}(isbn=${bookPick.isbn13 != null ? bookPick.isbn13 : bookPick.isbn10})}"
                               style="text-decoration: none; color: inherit;">
                                <!-- 썸네일 -->
                                <div class="img-wrapper">
                                    <img th:src="${bookPick.thumbnail}" alt="책 표지" width="150" height="200" style="object-fit: cover;"/>
                                </div>

                                <!-- 책 정보 -->
                                <div>
                                    <div class="book-title clamp-1" style="height: 25.59px"><strong  th:text="${bookPick.title}">제목</strong></div>
                                    <div class="book-author clamp-1" th:text="${bookPick.authors}">저자</div>
                                </div>
                                <span class="book-pick-reason clamp-3" th:text = "${bookPick.reason}"></span>

                            </a>
                        </div>
                    </div>

                    <div class="swiper-button-prev swiper-book-pick-button-prev"></div>
                    <div class="swiper-button-next swiper-book-pick-button-next"></div>
                </div>
            </div>
        </div>

    </section>

    <div class="main-section">
        <div class="card community">
            <div class="card-header">📚 커뮤니티</div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(communityPosts)}" class="empty-message">
                    등록된 글이 없어요.
                </div>

                <a class="post-row" th:href="@{/board/list/detail/{id}(id=${post.postId}, boardCode=${post.boardCode})}"
                   th:each="post : ${communityPosts}">
                    <span class="category" th:text="|[${post.categoryName}]|">카테고리</span>
                    <span class="title-wrapper">
                        <span class="title" th:text="${post.title}">제목</span>
                        <span class="commentCount" th:text="|[${post.commentCount}]|">조회수</span>
                    </span>
                    <span class="nickname" th:text="${post.nickname}">작성자</span>
                </a>
            </div>
            <div class="card-footer"><a href="/board/list?boardCode=1">커뮤니티 글 더보기 ></a></div>
        </div>

        <div class="card challenge">
            <div class="card-header">✍️ 도전 건필</div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(challengePosts)}" class="empty-message">
                    등록된 글이 없어요.
                </div>

                <a class="post-row" th:href="@{/board/list/detail/{id}(id=${post.postId}, boardCode=${post.boardCode})}"
                   th:each="post : ${challengePosts}">
                    <span class="category" th:text="|[${post.categoryName}]|">카테고리</span>
                    <span class="title-wrapper">
                    <span class="title" th:text="${post.title}">제목</span>
                    <span class="commentCount" th:text="|[${post.commentCount}]|">조회수</span>
                  </span>
                    <span class="nickname" th:text="${post.nickname}">작성자</span>
                </a>
            </div>
            <div class="card-footer"><a href="/board/list?boardCode=2">도전 건필 더보기 ></a></div>
        </div>

        <div class="card contest">
            <div class="card-header">📢 공모전</div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(contestPost)}" class="empty-message">
                    등록된 글이 없어요.
                </div>

                <div class="main-contest-container">
                    <a class="main-contest-wrapper"
                       th:href="@{/contest/detail/{id}(id=${contest.postId}, boardCode=${contest.boardCode})}"
                       th:each="contest : ${contestPost}">
                        <div class="contest-poster">
                            <img th:src="@{${contest.posterUrl}}" onerror="this.onerror=null; this.src='/images/commons/no-poster.png';" alt ="공모전 포스터" >
                        </div>
                        <div class="main-contest-info">
                            <div class="main-contest-category" th:text="'[' + ${contest.categoryNames}+ ']'"></div>
                            <div class="main-contest-title" th:text="${contest.title}">[다이슨] 공모전 제목</div>
                            <div class="main-contest-subtitle" th:text="${contest.subtitle}"></div>
                            <div class="main-contest-host" th:text="${contest.hostName}"></div>
                            <div class="main-contest-bottom">
                                <span class="dday"
                                      th:text="${T(com.geonpil.util.DdayUtils).getLabel(contest.dDay)}"
                                      th:classappend="${T(com.geonpil.util.DdayUtils).getLabelClass(contest.dDay)}">
                                  D-69
                                </span>
                                <span class="view-count">조회수 : <span
                                        th:text="${contest.viewCount}">41914</span></span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
            <div class="card-footer"><a href="contest/list?boardCode=3">공모전 더보기 &gt;</a></div>
        </div>
    </div>
</div>
<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src = "/js/swiper/swiper.js"></script>
    <script src = "/js/book/bookSearch.js"></script>
</th:block>
</body>
</html>
