<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>건필 메인</title>
</head>
<body>
<div layout:fragment="content">
<div class="banner-container">
    <div class="main-banner">
      <a href = "https://www.daesan.or.kr/daesan-award/2025/creative-fund.html"  target='_blank'><img src ="/images/banner/banner-main1.jpg"></a>
    </div>
    <div class="sub-banners">
      <div> <a href = "http://ahnchangho.or.kr/_memorial_hall/sub/sub03_03.php"  target='_blank'><img src ="/images/banner/banner-sub1.jpg"></a></div>
      <div> <a href = "http://hscf.co.kr/kor/sub6_01.php?wr_id=14802" target='_blank'><img src ="/images/banner/banner-sub2.jpg"></a></div>
      <div> <a href = "https://storynew.kyobobook.co.kr/story/cont/initStoryContStoryPros.ink" target='_blank'><img src ="/images/banner/banner-sub3.jpg"></a></div>
      <div> <a href = "https://www.youtube.com/watch?v=zhk-8EanZbM&t=1516s" target='_blank'><img src ="/images/banner/banner-sub4.jpg"></a></div>
    </div>
  </div>

  <div class="main-section">
    <div class="card community">
      <div class="card-header">📚 커뮤니티</div>
      <div class="card-body">
        <div th:if="${#lists.isEmpty(communityPosts)}" class="empty-message">
          등록된 글이 없어요.
        </div>

        <a class="post-row" th:href="@{/board/list/detail/{id}(id=${post.postId}, boardCode=${post.boardCode})}" th:each="post : ${communityPosts}">
          <span class="category" th:text="|[${post.categoryName}]|">카테고리</span>
          <span class="title-wrapper">
            <span class="title" th:text="${post.title}">제목</span>
            <span class="commentCount" th:text="|[${post.commentCount}]|">조회수</span>
          </span>
          <span class="nickname" th:text="${post.nickname}">작성자</span>
        </a>
      </div>
      <div class="card-footer"><a href="board/list?boardCode=1">커뮤니티 글 더보기 ></a></div>
    </div>

    <div class="card challenge">
      <div class="card-header">✍️ 도전 건필</div>
      <div class="card-body">
        <div th:if="${#lists.isEmpty(contestPosts)}" class="empty-message">
          등록된 글이 없어요.
        </div>

        <a class="post-row" th:href="@{/board/list/detail/{id}(id=${post.postId}, boardCode=${post.boardCode})}" th:each="post : ${contestPosts}">
          <span class="category" th:text="|[${post.categoryName}]|">카테고리</span>
          <span class="title-wrapper">
            <span class="title" th:text="${post.title}">제목</span>
            <span class="commentCount" th:text="|[${post.commentCount}]|">조회수</span>
          </span>
          <span class="nickname" th:text="${post.nickname}">작성자</span>
        </a>
      </div>
      <div class="card-footer"><a href="board/list?boardCode=2">도전 건필 더보기 ></a></div>
    </div>

    <div class="card contest">
      <div class="card-header">📢 공모전</div>
      <div class="card-body" >
        <div class="post-row">
          <span class="tag">[시]</span>
          <span class="title"> 공모전 모집합니다</span>
          <span class="author">모던북스</span>
          <span class ="dday">D-12</span>
        </div>
      </div>
      <div class="card-footer"><a href="/contest">공모전 더보기 &gt;</a></div>
    </div>
  </div>
</div>
</body>
</html>
