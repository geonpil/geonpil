<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout.html">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div layout:fragment="content">




    <section class=search-section>


        <div class=search-container>
            <div class="search-header">
                <h2 th:text="'검색어: ' + ${query}">검색어</h2>
            </div>
            <div class=search-wrapper>
                    <!-- 탭 메뉴 -->
                <div class="tab-menu">
                    <a th:href="@{/search(query=${query}, type='actor')}">책</a>
                    <a class = "line" th:href="@{/search(query=${query}, type='post')}">게시글</a>
                </div>


                <div class ="search-content">
                    <ul class ="book-list">
                        <li th:each="book : ${books}" style="margin-bottom: 1rem;">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <!-- ✅ 썸네일 이미지 -->
                                <img th:src="${book.thumbnail}" alt="책 표지" width="100" height="150"
                                     style="object-fit: cover;"/>

                                <!-- 책 정보 -->
                                <div>
                                    <strong th:text="${book.title}">제목</strong><br/>
                                    <span th:text="${book.publisher}">출판사</span><br/>
                                    <span th:text="${book.authors}">저자</span><br/>
                                    <span th:text="${book.contents}">콘텐츠</span><br/>
                                    <a th:href="${book.url}" target="_blank">상세 보기</a>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

</div>
</body>
</html>
